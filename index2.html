<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>LoL Ölüm Sesleri İndirici</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .container {
    width: 100%;
    max-width: 680px;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #c89b3c;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: #555;
    margin-bottom: 40px;
    letter-spacing: 1px;
  }

  .btn {
    background: #c89b3c;
    color: #0a0a0f;
    border: none;
    padding: 14px 36px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-bottom: 30px;
  }

  .btn:hover:not(:disabled) { background: #e0b84a; }
  .btn:disabled { background: #333; color: #666; cursor: not-allowed; }

  .progress-box {
    background: #111118;
    border: 1px solid #1e1e2e;
    padding: 20px;
    margin-bottom: 20px;
    display: none;
  }

  .progress-bar-bg {
    background: #1e1e2e;
    height: 6px;
    margin: 12px 0;
  }

  .progress-bar-fill {
    background: #c89b3c;
    height: 100%;
    width: 0%;
    transition: width 0.3s;
  }

  .progress-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    color: #c89b3c;
    letter-spacing: 1px;
  }

  .log {
    background: #07070c;
    border: 1px solid #1a1a2a;
    height: 260px;
    overflow-y: auto;
    padding: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    line-height: 1.7;
    display: none;
  }

  .log-line { color: #444; }
  .log-line.ok { color: #4caf82; }
  .log-line.err { color: #c0392b; }
  .log-line.info { color: #c89b3c; }

  .download-btn {
    background: #1a3a1a;
    color: #4caf82;
    border: 1px solid #4caf82;
    padding: 14px 36px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    margin-top: 16px;
    display: none;
    transition: all 0.2s;
  }
  .download-btn:hover { background: #234a23; }

  .note {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: #333;
    margin-top: 20px;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="container">
  <h1>⚔ LoL Ses İndirici</h1>
  <p class="subtitle">// tüm şampiyonların ölüm sesleri · fandom wiki · otomatik zip</p>

  <button class="btn" id="startBtn" onclick="baslat()">İndirmeyi Başlat</button>

  <div class="progress-box" id="progressBox">
    <div class="progress-label" id="progressLabel">Hazırlanıyor...</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressCount"></div>
  </div>

  <div class="log" id="log"></div>

  <button class="download-btn" id="downloadBtn">⬇ ZIP'i İndir</button>

  <p class="note">
    // Sesleri indirdikten sonra Firebase Storage'a yükle<br>
    // Hata veren karakterler atlanır, sonunda listesi gösterilir
  </p>
</div>

<script>
const proxy = "https://api.allorigins.win/raw?url=";
const fandomBase = "https://leagueoflegends.fandom.com/wiki/Special:FilePath/";

const wikiMapping = {
  "MonkeyKing": "Wukong", "Leblanc": "LeBlanc", "Kaisa": "Kai'Sa",
  "Khazix": "Kha'Zix", "Velkoz": "Vel'Koz", "Belveth": "Bel'Veth",
  "Chogath": "Cho'Gath", "DrMundo": "Dr._Mundo", "JarvanIV": "Jarvan_IV",
  "KogMaw": "Kog'Maw", "LeeSin": "Lee_Sin", "MasterYi": "Master_Yi",
  "Nunu": "Nunu_%26_Willump", "RekSai": "Rek'Sai", "Renata": "Renata_Glasc",
  "TahmKench": "Tahm_Kench", "TwistedFate": "Twisted_Fate", "XinZhao": "Xin_Zhao"
};

function wikiIsmiYap(id) { return wikiMapping[id] || id; }

function log(msg, cls = "log-line") {
  const div = document.getElementById('log');
  div.style.display = "block";
  const line = document.createElement('div');
  line.className = `log-line ${cls}`;
  line.textContent = msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
}

async function sesIndir(isim) {
  const wikiName = wikiIsmiYap(isim);
  const denemeler = [
    `${fandomBase}${wikiName}_Death.ogg`,
    `${fandomBase}${wikiName}_Death1.ogg`,
    `${fandomBase}${isim}_Death.ogg`,
  ];
  for (const url of denemeler) {
    try {
      const res = await fetch(proxy + encodeURIComponent(url));
      if (!res.ok) continue;
      const blob = await res.blob();
      if (blob.size < 1000) continue; // boş/hatalı dosya
      return blob;
    } catch (_) {}
  }
  return null;
}

let zipBlob = null;

async function baslat() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('progressBox').style.display = "block";

  log("Karakter listesi çekiliyor...", "info");

  const verRes = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
  const versions = await verRes.json();
  const latestVersion = versions[0];
  log(`Data Dragon versiyon: ${latestVersion}`, "info");
  const res = await fetch(`https://ddragon.leagueoflegends.com/cdn/${latestVersion}/data/tr_TR/champion.json`);
  const data = await res.json();
  const karakterler = Object.keys(data.data).sort();
  const toplam = karakterler.length;

  log(`${toplam} karakter bulundu. İndirme başlıyor...`, "info");

  const zip = new JSZip();
  const sesler = zip.folder("olum_sesleri");
  const basarisiz = [];
  let tamamlanan = 0;

  for (const isim of karakterler) {
    document.getElementById('progressLabel').textContent = `İndiriliyor: ${isim}`;
    document.getElementById('progressCount').textContent = `${tamamlanan} / ${toplam}`;
    document.getElementById('progressFill').style.width = (tamamlanan / toplam * 100) + "%";

    const blob = await sesIndir(isim);
    if (blob) {
      sesler.file(`${isim}_Death.ogg`, blob);
      log(`✓ ${isim}`, "ok");
    } else {
      basarisiz.push(isim);
      log(`✗ ${isim} — bulunamadı`, "err");
    }
    tamamlanan++;

    // Rate limit için kısa bekleme
    await new Promise(r => setTimeout(r, 300));
  }

  document.getElementById('progressLabel').textContent = "Zip hazırlanıyor...";
  document.getElementById('progressFill').style.width = "100%";
  document.getElementById('progressCount').textContent = `${tamamlanan} / ${toplam} tamamlandı`;

  zipBlob = await zip.generateAsync({ type: "blob" });

  log("─────────────────────────────", "info");
  log(`✓ Başarılı: ${tamamlanan - basarisiz.length} karakter`, "ok");
  if (basarisiz.length > 0) {
    log(`✗ Bulunamayan (${basarisiz.length}): ${basarisiz.join(", ")}`, "err");
  }
  log("ZIP hazır, indirebilirsin!", "info");

  const btn = document.getElementById('downloadBtn');
  btn.style.display = "block";
  btn.onclick = () => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = "lol_olum_sesleri.zip";
    a.click();
  };
}
</script>
</body>
</html>
